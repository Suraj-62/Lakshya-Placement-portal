version: '3.8'

services:
  backend:
    build: 
      context: ./backend
      dockerfile: Dockerfile
    container_name: lakshya_backend
    ports:
      - "5000:5000"
    # IMPORTANT: Ensure your backend/.env file has correct values (e.g. MONGO_URI)
    env_file:
      - ./backend/.env
    restart: unless-stopped

  frontend:
    build: 
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - NEXT_PUBLIC_API_URL=http://localhost:5000/api
        - NEXT_PUBLIC_BASE_URL=http://localhost:5000
    container_name: lakshya_frontend
    ports:
      - "3000:3000"
    # IMPORTANT: Ensure frontend environment variables like NEXT_PUBLIC_API_URL are set.
    # In a local docker-compose environment, you can point to localhost since ports are exposed.
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:5000/api
      - NEXT_PUBLIC_BASE_URL=http://localhost:5000
    depends_on:
      - backend
    restart: unless-stopped
